name: Docker Image CI

on:
  push:
    branches: 
     - main
     
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Build and name the image locally
    - name: Build the Docker image
      run: docker build -t my-image:v1 . 

    # 2. Tag the local image for your Docker Hub repository
    - name: Docker tag
      run: docker tag my-image:v1 saikumaar/my-image:v1

    # 3. Scan the image using the newly updated, secure Trivy Action tag (v0.36.0)
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0  # CHANGED: Added the mandatory "v" prefix format
      with:
        image-ref: 'saikumaar/my-image:v1'
        format: 'table'
        exit-code: '1' 
        ignore-unfixed: true 
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # 4. Log in to Docker Hub (Only runs if Trivy scan passes successfully)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: 'saikumaar'
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Push the verified image to Docker Hub
    - name: Docker push
      run: docker push saikumaar/my-image:v1
