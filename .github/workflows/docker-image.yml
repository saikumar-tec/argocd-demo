name: Docker Image CI

on:
  push:
    branches: 
     - main
     
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Build and name the image locally
    - name: Build the Docker image
      run: docker build -t my-image:v1 . 

    # 2. Tag the local image for your Docker Hub repository
    - name: Docker tag
      run: docker tag my-image:v1 saikumaar/my-image:v1

    # 3. Scan the image using the newly updated, secure Trivy Action tag (v0.36.0)
    - name: Trivy Scan
      run: |
         trivy image \
         --severity CRITICAL \
         --exit-code 1 \
         my-image:v1
      

    # 4. Log in to Docker Hub (Only runs if Trivy scan passes successfully)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: 'saikumaar'
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Push the verified image to Docker Hub
    - name: Docker push
      run: docker push saikumaar/my-image:v1
