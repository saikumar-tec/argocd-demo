apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: Argocd-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/saikumar-tec/argocd-demo.git
    targetRevision: HEAD
    path: Argo-cddemo/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true